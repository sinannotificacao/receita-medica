<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitação SUS - 2 vias lado a lado</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app no-print">
    <section class="panel">
      <h1>Solicitação em 2 vias</h1>
      <p>Preencha uma vez e imprima duas cópias lado a lado em uma folha A4 paisagem.</p>

      <div class="field full">
        <label for="nome">Nome do paciente <span class="required-mark">*</span></label>
        <input id="nome" type="text" placeholder="Digite o nome completo" required />
        <small class="hint">Campo obrigatório.</small>
      </div>

      <div class="row three">
        <div class="field">
          <label for="dn">Data de nascimento</label>
          <input id="dn" type="date" />
        </div>
        <div class="field">
          <label for="idade">Idade</label>
          <input id="idade" type="text" placeholder="Calculada automaticamente" readonly />
        </div>
        <div class="field">
          <label for="cpf">CPF</label>
          <input id="cpf" type="text" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" />
          <small class="hint">Se preenchido, o CPF precisa ser válido.</small>
        </div>
      </div>

      <div class="row two">
        <div class="field">
          <label for="tipo">Tipo</label>
          <select id="tipo">
            <option value="EXAME">EXAME</option>
            <option value="CONSULTA">CONSULTA</option>
          </select>
        </div>
        <div class="field">
          <label for="dataMarcada">Data marcada</label>
          <input id="dataMarcada" type="date" />
        </div>
      </div>

      <div class="row two">
        <div class="field">
          <label for="hora">Hora</label>
          <input id="hora" type="time" />
        </div>
        <div class="field">
          <label for="local">Local</label>
          <input id="local" type="text" placeholder="Informe o local" />
        </div>
      </div>

      <div class="field full">
        <label for="solicitacao">Solicitação</label>
        <textarea id="solicitacao" rows="4" placeholder="Ex.: ECG, raio X de tórax PA/perfil, consulta com cardiologia..."></textarea>
      </div>

      <div class="field full">
        <label for="obs">Observações</label>
        <textarea id="obs" rows="4" placeholder="Digite observações adicionais"></textarea>
      </div>

      <div class="actions">
        <button type="button" id="printBtn">Imprimir A4</button>
      </div>
    </section>

    <section class="preview-wrap">
      <div class="sheet landscape" id="sheetPreview">
        <div class="copy">
          <div class="slip" id="copy1"></div>
        </div>
        <div class="divider"></div>
        <div class="copy">
          <div class="slip" id="copy2"></div>
        </div>
      </div>
    </section>
  </div>

  <div class="print-sheet only-print" id="printSheet">
    <div class="print-copy"><div class="slip" id="printCopy1"></div></div>
    <div class="print-divider"></div>
    <div class="print-copy"><div class="slip" id="printCopy2"></div></div>
  </div>

  <template id="slipTemplate">
    <article class="doc">
      <header class="doc-header">
        <div class="logo-box">
          <img src="img/logo.jpg" alt="Brasão de Nova Serrana" class="logo" />
        </div>
        <div class="header-text">
          <div class="title-1">SISTEMA ÚNICO DE SAÚDE</div>
          <div class="title-2">PREFEITURA MUNICIPAL DE NOVA SERRANA</div>
          <div class="title-3">SECRETARIA MUNICIPAL DE SAÚDE - (37) 3225-8700</div>
          <div class="title-4">AVENIDA BENJAMIN MARTINS DO ESPÍRITO SANTO Nº 2112, PARK DONA GUMERCINDA</div>
          <div class="title-4">NOVA SERRANA - MG</div>
        </div>
      </header>

      <section class="box">
        <div class="box-title">DADOS DO PACIENTE</div>
        <div class="line-block">
          <div><strong>NOME:</strong> <span data-bind="nome"></span></div>
        </div>
        <div class="line-row three-cols">
          <div><strong>DN:</strong> <span data-bind="dn"></span></div>
          <div><strong>IDADE:</strong> <span data-bind="idade"></span></div>
          <div><strong>CPF:</strong> <span data-bind="cpf"></span></div>
        </div>
      </section>

      <section class="box solicitacao-box">
        <div class="box-title">SOLICITAÇÃO</div>
        <div class="solicita-line"><strong>SOLICITO:</strong> <span data-bind="tipo"></span></div>
        <div class="request-text" data-bind="solicitacao"></div>
      </section>

      <section class="box agenda-box">
        <div class="agenda-row">
          <div><strong>MARCADO DIA</strong> <span data-bind="dataMarcada"></span></div>
          <div><strong>ÀS</strong> <span data-bind="hora"></span> HS</div>
        </div>
        <div class="local-row"><strong>LOCAL:</strong> <span data-bind="local"></span></div>
      </section>

      <section class="box obs-box">
        <div><strong>OBSERVAÇÕES:</strong></div>
        <div class="request-text obs-text" data-bind="obs"></div>
      </section>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
